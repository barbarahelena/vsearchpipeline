    <li>Callahan BJ, McMurdie PJ, Rosen MJ, Han AW, Johnson AJ, Holmes SP. (2016). DADA2: High-resolution sample inference from Illumina amplicon data. Nature Methods, 13(7), 581–583. doi: <a href="https://doi.org/10.1038/nmeth.3869">10.1038/nmeth.3869</a></li>
    <li>McMurdie PJ, Holmes S. (2013). phyloseq: an R package for reproducible interactive analysis and graphics of microbiome census data. PLoS One, 8(4), e61217. doi: <a href="https://doi.org/10.1371/journal.pone.0061217">10.1371/journal.pone.0061217</a></li>
    <li>Davis NM, Proctor DM, Holmes SP, Relman DA, Callahan BJ. (2018). Simple statistical identification and removal of contaminant sequences in marker-gene and metagenomics data. Microbiome, 6(1), 226. doi: <a href="https://doi.org/10.1186/s40168-018-0605-2">10.1186/s40168-018-0605-2</a></li>

data: |
  <h4>Methods</h4>
  <p>Data was processed using vsearchpipeline v${workflow.manifest.version} ${doi_text} (<a href="https://github.com/barbarahelena/vsearchpipeline">https://github.com/barbarahelena/vsearchpipeline</a>).</p>
  <p>The pipeline was executed with Nextflow v${workflow.nextflow.version} (<a href="https://doi.org/10.1038/nbt.3820">Di Tommaso <em>et al.</em>, 2017</a>) with the following command:</p>
  <pre><code>${workflow.commandLine}</code></pre>
  <p>${tool_citations}</p>
  <h4>References</h4>
  <ul>
    <li>Rognes T, Flouri T, Nichols B, Quince C, Mahé F. (2016). VSEARCH: a versatile open source tool for metagenomics. PeerJ, 4:e2584. doi: <a href="https://doi.org/10.7717/peerj.2584">10.7717/peerj.2584</a></li>
    <li>Li H. seqtk: Toolkit for processing sequences in FASTA/Q formats. <a href="https://github.com/lh3/seqtk">https://github.com/lh3/seqtk</a></li>
    <li>Katoh K, Standley DM. (2013). MAFFT multiple sequence alignment software version 7: improvements in performance and usability. Molecular Biology and Evolution, 30(4), 772–780. doi: <a href="https://doi.org/10.1093/molbev/mst010">10.1093/molbev/mst010</a></li>

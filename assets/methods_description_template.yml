    <li>Andrews S. (2010). FastQC: A Quality Control Tool for High Throughput Sequence Data. <a href="https://www.bioinformatics.babraham.ac.uk/projects/fastqc/">https://www.bioinformatics.babraham.ac.uk/projects/fastqc/</a></li>
